# Conservative low-latency defaults for desktop audio.
#
# 256/48000 is about 5.3 ms per quantum. Guitar sessions can request a sharper
# 128/48000 through the launcher in ~/.local/bin/guitarix-low-latency.
context.properties = {
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 48000 ]
    default.clock.quantum       = 256
    default.clock.min-quantum   = 32
    default.clock.max-quantum   = 1024
}
